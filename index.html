<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Romantic Birthday</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #200020, #000000);
}

canvas {
  position: absolute;
}

.text {
  position: absolute;
  color: white;
  font-size: 34px;
  text-align: center;
  font-weight: bold;
  width: 100%;
  top: 40%;
  opacity: 0;
  transition: 1.5s;
}

.heart-bg {
  position: absolute;
  color: rgba(255, 0, 100, 0.2);
  font-size: 20px;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}
</style>

</head>
<body>

<canvas id="heartCanvas"></canvas>
<canvas id="fireCanvas"></canvas>

<div class="text" id="msg">
  🎉 Happy Birthday 🎉 <br>
  <span style="color:#ff4d6d;">Barbie</span>💖
</div>

<script>
// ===== MAIN HEART =====
const canvas = document.getElementById("heartCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let progress = 0;

function heartFunction(t) {
  return {
    x: 16 * Math.pow(Math.sin(t), 3),
    y: -(13 * Math.cos(t) - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t) - Math.cos(4*t))
  };
}

for (let i = 0; i < 1200; i++) {
  let t = Math.random() * Math.PI * 2;
  let pos = heartFunction(t);

  particles.push({
    baseX: canvas.width / 2 + pos.x * 15,
    baseY: canvas.height / 2 + pos.y * 15,
    size: Math.random() * 3 + 1,
    alpha: Math.random()
  });
}

// ===== FIREWORKS =====
const fireCanvas = document.getElementById("fireCanvas");
const fctx = fireCanvas.getContext("2d");

fireCanvas.width = window.innerWidth;
fireCanvas.height = window.innerHeight;

let fireworks = [];

function createFirework() {
  let x = Math.random() * fireCanvas.width;
  let y = Math.random() * fireCanvas.height / 2;

  for (let i = 0; i < 50; i++) {
    fireworks.push({
      x: x,
      y: y,
      angle: Math.random() * 2 * Math.PI,
      speed: Math.random() * 4 + 1,
      life: 100
    });
  }
}

function drawFireworks() {
  fctx.clearRect(0, 0, fireCanvas.width, fireCanvas.height);

  fireworks.forEach((f, i) => {
    let vx = Math.cos(f.angle) * f.speed;
    let vy = Math.sin(f.angle) * f.speed;

    f.x += vx;
    f.y += vy;
    f.life--;

    fctx.fillStyle = "rgba(255,100,200," + f.life/100 + ")";
    fctx.fillRect(f.x, f.y, 2, 2);

    if (f.life <= 0) fireworks.splice(i, 1);
  });

  requestAnimationFrame(drawFireworks);
}

// ===== FLOATING HEARTS =====
function createFloatingHearts() {
  for (let i = 0; i < 20; i++) {
    let h = document.createElement("div");
    h.innerHTML = "💖";
    h.className = "heart-bg";
    h.style.left = Math.random() * 100 + "vw";
    h.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.body.appendChild(h);
  }
}

// ===== DRAW HEART =====
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    if (p.baseY > canvas.height - progress) {
      ctx.fillStyle = "rgba(255,0,80," + p.alpha + ")";
      ctx.beginPath();
      ctx.arc(p.baseX, p.baseY, p.size, 0, Math.PI * 2);
      ctx.fill();

      p.alpha += (Math.random() - 0.5) * 0.05;
      if (p.alpha < 0.2) p.alpha = 0.2;
      if (p.alpha > 1) p.alpha = 1;
    }
  });

  progress += 3;

  if (progress > canvas.height) {
    document.getElementById("msg").style.opacity = 1;
    createFirework();
  }

  requestAnimationFrame(draw);
}

// ===== INIT =====
createFloatingHearts();
draw();
drawFireworks();

// repeat fireworks
setInterval(createFirework, 1200);

</script>

</body>
</html>
